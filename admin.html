<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

.container {
  max-width: 800px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  margin-left: 5px;
  padding: 8px 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.approve {
  background: #22c55e;
  color: white;
}

.delete {
  background: #ef4444;
  color: white;
}

.refresh {
  background: #38bdf8;
  color: black;
  display: block;
  margin: 10px auto;
}
</style>
</head>

<body>

<h1>Admin Panel</h1>

<div class="container">

<button class="refresh" onclick="loadUsers()">Refresh Users</button>

<div id="users"></div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://ldzvaxawdtstwovvvfbv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkenZheGF3ZHRzdHdvdnZ2ZmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Nzg4MTEsImV4cCI6MjA5MTA1NDgxMX0.SfS1eNoQtgW2Pb_keC3wTSXGHbvoLn8WwD-MudNGzHc"
);

async function loadUsers() {
  const { data, error } = await supabase
    .from("users")
    .select("*");

  const container = document.getElementById("users");
  container.innerHTML = "";

  if (error) {
    container.innerHTML = "Error loading users";
    return;
  }

  data.forEach(user => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div>
        <b>${user.email}</b><br>
        Phone: ${user.phone || "N/A"}<br>
        Status: ${user.status}
      </div>

      <div>
        <button class="approve" onclick="approveUser('${user.id}')">Approve</button>
        <button class="delete" onclick="deleteUser('${user.id}')">Delete</button>
      </div>
    `;

    container.appendChild(div);
  });
}

// APPROVE USER
async function approveUser(id) {
  await supabase
    .from("users")
    .update({ status: "approved" })
    .eq("id", id);

  loadUsers();
}

// DELETE USER
async function deleteUser(id) {
  await supabase
    .from("users")
    .delete()
    .eq("id", id);

  loadUsers();
}

loadUsers();
</script>

</body>
</html>
